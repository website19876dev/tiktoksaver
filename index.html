<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SaverByZakiy | Ultra Stealth</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; overflow: hidden; margin: 0; touch-action: manipulation; }
        .font-tech { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; }

        /* SPLASH SCREEN ROKET */
        #splash-screen {
            position: fixed; inset: 0; background: #020617; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out;
        }
        .rocket-box { position: relative; animation: shake 0.1s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(1.5px); } }
        .launch { animation: fly-up 1.2s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards !important; }
        @keyframes fly-up { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-120vh) scale(0.5); opacity: 0; } }

        /* TRANSISI MASUK DARI SAMPING */
        .content-hidden { transform: translateX(100%); opacity: 0; transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .content-show { transform: translateX(0); opacity: 1; }

        /* STEALTH UI */
        .card-stealth { background: linear-gradient(145deg, #0f172a, #020617); border: 1px solid #1e293b; }
        .input-dark { background: #000; border: 1px solid #334155; color: #38bdf8; outline: none; }
        .input-dark:focus { border-color: #0ea5e9; }
        .btn-stealth { background: #0ea5e9; color: #020617; font-weight: 900; transition: 0.3s; }
        .btn-stealth:active { transform: scale(0.95); }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="rocket-box" id="rocket">
            <i class="fas fa-rocket text-5xl text-sky-400 drop-shadow-[0_0_15px_#0ea5e9]"></i>
        </div>
        <h2 class="font-tech text-[9px] mt-12 text-slate-500 tracking-[0.8em] uppercase">Booting System</h2>
    </div>

    <div id="main-content" class="content-hidden flex items-center justify-center min-h-screen p-4">
        <div class="max-w-md w-full card-stealth rounded-[2.5rem] p-8 shadow-2xl border-t border-slate-800">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-12 h-12 flex items-center justify-center bg-sky-500/10 rounded-2xl border border-sky-500/20"><i class="fas fa-bolt text-sky-400"></i></div>
                <div><h1 class="font-tech text-sm text-white uppercase">SaverByZakiy</h1><p class="text-[8px] text-slate-500 font-bold tracking-widest uppercase">Engine Stable v4.2</p></div>
            </div>

            <div class="space-y-4">
                <input type="text" id="urlInput" placeholder="ENTER TIKTOK/IG URL..." class="input-dark w-full px-5 py-4 rounded-2xl text-xs font-bold">
                <button onclick="processLink()" id="btnGo" class="btn-stealth w-full py-4 rounded-2xl text-[10px] tracking-widest uppercase shadow-lg shadow-sky-500/10">Execute Download</button>
            </div>

            <div id="resultBox" class="hidden mt-6">
                <div id="videoContainer" class="hidden"><video id="videoPlayer" controls class="w-full rounded-2xl border border-slate-800 bg-black shadow-2xl"></video></div>
                <div id="photoContainer" class="hidden max-h-[300px] overflow-y-auto pr-2 custom-scroll"><div id="photoList" class="space-y-4"></div></div>
                <button onclick="forceDownload()" class="w-full py-3 mt-6 bg-slate-100 text-slate-900 rounded-xl font-black text-[10px] uppercase transition-all active:scale-95">Save to Gallery</button>
            </div>

            <div class="mt-10 pt-6 border-t border-slate-800/50 flex justify-between items-center text-[7px] text-slate-600 font-bold uppercase tracking-[0.3em]">
                <span>&copy; 2026 Zakiy Dev</span>
                <span class="text-sky-500 animate-pulse">System Online</span>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('rocket').classList.add('launch'); }, 1000);
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('main-content').classList.add('content-show');
                }, 500);
            }, 2200);
        });

        let currentDlUrl = "";
        async function processLink() {
            const url = document.getElementById('urlInput').value;
            const res = document.getElementById('resultBox');
            const btn = document.getElementById('btnGo');
            if(!url) return;
            btn.innerText = "PROCESSING..."; btn.disabled = true;

            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                if(data.code === 0) {
                    const item = data.data;
                    if(item.images) {
                        document.getElementById('videoContainer').classList.add('hidden');
                        document.getElementById('photoContainer').classList.remove('hidden');
                        const list = document.getElementById('photoList'); list.innerHTML = '';
                        item.images.forEach((img, i) => {
                            list.innerHTML += `<div class="p-2 bg-slate-900 rounded-xl border border-slate-800 mb-2"><img src="${img}" class="rounded-lg w-full mb-2"><button onclick="forceDownload('${img}', 'foto_${i+1}')" class="w-full py-2 bg-slate-800 text-[8px] font-bold rounded-lg border border-slate-700 uppercase">Download #${i+1}</button></div>`;
                        });
                        currentDlUrl = item.music;
                    } else {
                        document.getElementById('photoContainer').classList.add('hidden');
                        document.getElementById('videoContainer').classList.remove('hidden');
                        document.getElementById('videoPlayer').src = item.play; currentDlUrl = item.play;
                    }
                    res.classList.remove('hidden');
                }
            } catch (e) { alert("Failed to fetch data!"); }
            finally { btn.innerText = "EXECUTE DOWNLOAD"; btn.disabled = false; }
        }

        function forceDownload(url = currentDlUrl, name = "media") { window.open(url, '_blank'); }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
